<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'" />
    <title>Meeting Notifier — Console</title>
    <style>
        :root { color-scheme: dark; }
        html, body { margin: 0; height: 100%; background: #1e1e1e; color: #d4d4d4; }
        body { font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; display: flex; flex-direction: column; }
        #bar {
            position: sticky; top: 0; display: flex; align-items: center; gap: 12px;
            padding: 6px 10px; background: #252526; border-bottom: 1px solid #333; flex: 0 0 auto;
        }
        #bar strong { font-size: 12px; font-weight: 600; }
        #bar .spacer { flex: 1; }
        #bar label { display: inline-flex; align-items: center; gap: 4px; color: #aaa; }
        button {
            background: #0e639c; color: #fff; border: none; padding: 3px 10px;
            border-radius: 4px; cursor: pointer; font-size: 11px;
        }
        button:hover { background: #1177bb; }
        #log { flex: 1; overflow-y: auto; padding: 8px 10px; white-space: pre-wrap; word-break: break-word; }
        .line { padding: 0 0; }
        .err { color: #f48771; }
        .warn { color: #dcdcaa; }
    </style>
</head>
<body>
    <div id="bar">
        <strong>Meeting Notifier — Console</strong>
        <span class="spacer"></span>
        <label><input type="checkbox" id="auto" checked /> Auto-scroll</label>
        <button id="clear">Clear</button>
    </div>
    <div id="log"></div>
    <script>
        const { ipcRenderer } = require('electron');
        const logEl = document.getElementById('log');
        const auto = document.getElementById('auto');

        function add(line, level) {
            const div = document.createElement('div');
            div.className = 'line' + (level === 'error' ? ' err' : level === 'warn' ? ' warn' : '');
            div.textContent = line;
            logEl.appendChild(div);
            while (logEl.childNodes.length > 3000) logEl.removeChild(logEl.firstChild);
            if (auto.checked) logEl.scrollTop = logEl.scrollHeight;
        }

        ipcRenderer.on('log-line', (_e, { line, level }) => add(line, level));
        ipcRenderer.on('log-history', (_e, lines) => {
            logEl.innerHTML = '';
            lines.forEach((l) => add(l.line, l.level));
        });

        document.getElementById('clear').onclick = () => { logEl.innerHTML = ''; };
        ipcRenderer.send('log-ready');
    </script>
</body>
</html>
