<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    body {
      font: 12px/1.2 -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 10px;
      background: rgba(28, 28, 30, 0.92);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      -webkit-app-region: drag;
      user-select: none;
      white-space: nowrap;
      cursor: default;
    }
    body.alert { background: rgba(120, 20, 20, 0.94); border-color: rgba(255, 100, 100, 0.4); }
    .dot { color: #ff7846; margin-right: 5px; }
    body.alert .dot { color: #ff4444; }
  </style>
</head>
<body>
  <span class="dot">●</span><span id="text">Meeting Notifier</span>
</body>
</html>
