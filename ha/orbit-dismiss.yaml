# Full HA *package* — only if you use configuration.yaml packages/.
# Do NOT paste this whole file into the Automations YAML editor.
#
# For most users, follow these two steps instead:
#
# STEP 1 — Create helper (UI):
#   Settings → Devices & services → Helpers → Create helper → Toggle
#   Name: Orbit Dismiss
#   Entity ID: input_boolean.orbit_dismiss
#
# STEP 2 — Create automation:
#   Paste the contents of orbit-dismiss-automation.yaml
#   into Automations → Create → Edit in YAML

input_boolean:
  orbit_dismiss:
    name: Orbit Dismiss

automation:
  - id: orbit_dismiss_from_phone
    alias: Orbit — dismiss alert from phone
    mode: single
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: ORBIT_DISMISS
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: MN_DISMISS
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.orbit_dismiss
