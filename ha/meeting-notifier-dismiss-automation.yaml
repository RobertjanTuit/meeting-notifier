# Paste THIS FILE ONLY into:
# Settings → Automations & scenes → Automations → Create automation → ⋮ → Edit in YAML
#
# Prerequisite: create the helper first (Settings → Helpers → Toggle):
#   entity_id: input_boolean.meeting_notifier_dismiss

alias: Meeting Notifier — dismiss alert from phone
mode: single
trigger:
  - platform: event
    event_type: mobile_app_notification_action
    event_data:
      action: MN_DISMISS
action:
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.meeting_notifier_dismiss
